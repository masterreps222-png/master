    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #1a0000, #000);
            color: #eee;
            position: relative;
            overflow-x: hidden;
        }

        /* 🔴 Animated glow background */
        body::before {
            content: "";
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(255,0,0,0.3), transparent);
            filter: blur(100px);
            animation: moveGlow 10s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes moveGlow {
            0% { transform: translate(-150px, -100px); }
            100% { transform: translate(250px, 180px); }
        }

        /* Linki w logo - biały tekst, po najechaniu czerwony */
        .link-white {
            text-decoration: none;  /* usuwa podkreślenie */
            transition: color 0.2s ease;
        }

        .link-white h3,
        .link-white h5 {
            color: #ffffff;  /* biały kolor tekstu */
            transition: color 0.2s ease;
        }

        .link-white:hover h3,
        .link-white:hover h5 {
            color: #ff3333;  /* czerwony po najechaniu */
        }
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.8rem 2rem 2.5rem;
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-bottom: 1rem;
        }
        .logo h1 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: pulseRed 2s infinite;
        }
        @keyframes pulseRed {
            0%,100% { text-shadow: 0 0 10px #ff0000; }
            50% { text-shadow: 0 0 30px #ff0000; }
        }
        .logo p {
            font-size: 0.8rem;
            color: #ff9999;
            letter-spacing: 2px;
            margin-top: -5px;
        }
/* ========== WERSJA MOBILNA ========== */
@media (max-width: 768px) {
    .app-container {
        padding: 1rem;
    }

    /* Logo na telefon */
    .logo h1 {
        font-size: 2rem;
        letter-spacing: 3px;
    }
    
    .logo h3 {
        font-size: 0.85rem;
    }
    
    .logo h5 {
        font-size: 0.7rem;
    }

    /* Przycisk ustawień */
    .btn-icon {
        top: 10px;
        right: 10px;
        width: 40px;
        height: 40px;
    }
    
    .btn-icon i {
        font-size: 20px;
    }

    /* Dropdown ustawień */
    .settings-dropdown {
        top: 60px;
        right: 10px;
        padding: 12px 16px;
        min-width: 180px;
    }

    /* Wyszukiwarka i kategorie */
    .filter-section {
        flex-direction: column;
        gap: 1rem;
    }
    
    .search-box {
        width: 100%;
    }
    
    /* 🔥 KATEGORIE - POD SOBĄ (PIONOWO) na telefonie */
    .categories-tabs {
        display: flex;
        flex-direction: column;  /* zmiana z row na column - kategorie pod sobą */
        gap: 0.6rem;
        width: 100%;
        overflow-x: visible;     /* wyłączamy scroll poziomy */
        flex-wrap: nowrap;
    }
    
    .cat-tab {
        width: 100%;             /* każda kategoria na całą szerokość */
        text-align: center;
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        border-radius: 40px;
    }

    /* Grid produktów - 2 kolumny na telefonie */
    .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
    }
    
    .product-card {
        border-radius: 20px;
    }
    
    .card-img {
        height: 140px;
    }
    
    .product-title {
        font-size: 0.9rem;
    }
    
    .price-block {
        padding: 0.3rem 0.6rem;
        margin: 0.4rem 0;
    }
    
    .main-price {
        font-size: 1rem;
    }
    
    .cny-price {
        font-size: 0.6rem;
    }
    
    .tag {
        font-size: 0.55rem;
        padding: 0.15rem 0.6rem;
    }
    
    .rating {
        font-size: 0.7rem;
        margin: 6px 0;
    }
    
    .card-actions {
        gap: 0.5rem;
        margin-top: 0.7rem;
    }
    
    .btn-outline, .btn-solid {
        padding: 0.4rem 0;
        font-size: 0.65rem;
    }

    .socials {
        display: none;
    }
    
    /* Footer */

        font-size: 0.6rem;
        margin-top: 2rem;
        padding-top: 1rem;
    }
}

    }
}

@media (min-width: 769px) and (max-width: 1024px) {

        /* ========== PASEK NAWIGACJI ========== */
        .top-nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 1rem 0 2rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #aa3a3a;
        }
        .top-nav a {
            color: #ffbbbb;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            transition: none;
        }
        .top-nav a:hover {
            color: #ff5a5a;
            border-bottom-color: #ff4d4d;
            text-shadow: 0 0 6px #ff5a5a;
        }

        /* ========== Ikonka ustawień ========== */
        .btn-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            cursor: pointer;
            background: linear-gradient(145deg, #ff1a1a, #990000);
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            transition: none;
        }
        .btn-icon i {
            font-size: 26px;
            color: white;
        }
        .btn-icon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ff3333;
        }

        /* Dropdown menu z ustawieniami */
        .settings-dropdown {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 200;
            background: #1a0505cc;
            backdrop-filter: blur(12px);
            border: 1px solid #ff4d4d;
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 200px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.2s ease, visibility 0.2s, transform 0.2s;
        }
        .settings-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .settings-dropdown .setting-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .settings-dropdown label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffbbbb;
        }
        .settings-dropdown select {
            background: #2a0a0a;
            border: 1px solid #ff6a6a;
            border-radius: 40px;
            padding: 8px 12px;
            color: #fff0f0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }
        .settings-dropdown select:hover {
            border-color: #ff4d4d;
            box-shadow: 0 0 8px #ff4d4d;
        }

        /* wyszukiwarka + kategorie */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            margin: 1.8rem 0 2rem;
        }
        .search-box {
            background: #0c0505;
            border-radius: 60px;
            border: 1px solid #ff4d4d;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            width: 300px;
            box-shadow: 0 0 5px #ff3333;
            transition: none;
        }
        .search-box:focus-within {
            border-color: #ff1a1a;
            box-shadow: 0 0 12px #ff3333;
        }
        .search-box i {
            color: #ff5a5a;
            font-size: 1rem;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 0.7rem 0.5rem;
            font-size: 0.9rem;
            color: #ffdddd;
            width: 100%;
            outline: none;
        }
        .search-box input::placeholder {
            color: #aa6a6a;
        }

        .categories-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .cat-tab {
            background: #1a0a0a;
            border: 1px solid #aa3a3a;
            padding: 0.5rem 1.4rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            color: #ffbbbb;
            transition: none;
        }
        .cat-tab.active {
            background: #ff2a2a;
            border-color: #ff0000;
            color: white;
            box-shadow: 0 0 16px #ff3a3a;
            transform: scale(1.02);
        }
        .cat-tab:hover {
            background: #ff4d4d;
            color: #1a0101;
            border-color: #ff8888;
        }

        /* grid produktów */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.8rem;
            margin-top: 1.8rem;
        }
        .product-card {
            background: rgba(15, 5, 5, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid #aa3a3a;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
            transition: none;
        }
        .product-card:hover {
            border-color: #ff4d4d;
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -8px rgba(255, 30, 30, 0.5), 0 0 0 1px #ff5a5a;
        }
        .card-img {
            height: 190px;
            background: #2a1515;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            padding: 1rem 1rem 1.3rem;
        }
        .product-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffaeae;
            letter-spacing: -0.2px;
        }
        .price-block {
            display: flex;
            gap: 1rem;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 0.6rem 0;
            background: #1f0e0e;
            padding: 0.4rem 0.8rem;
            border-radius: 60px;
            border-left: 4px solid #ff4d4d;
        }
        .main-price {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ff5a5a;
            text-shadow: 0 0 6px #ff3a3a;
        }
        .cny-price {
            font-size: 0.75rem;
            color: #bb8888;
            text-decoration: line-through;
        }
        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.7rem 0;
        }
        .tag {
            background: #2a1212;
            font-size: 0.65rem;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            font-weight: 700;
            color: #ffa07a;
            border-left: 2px solid #ff4d4d;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: #ffbb66;
        }
        .rating i {
            color: #ffaa33;
            filter: drop-shadow(0 0 3px #ffaa33);
        }
        .card-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .btn-outline, .btn-solid {
            flex: 1;
            text-align: center;
            padding: 0.55rem 0;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.7rem;
            cursor: pointer;
            transition: none;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #ff5a5a;
            color: #ff8a8a;
        }
        .btn-outline:hover {
            background: #ff2a2a;
            border-color: #ff2a2a;
            color: white;
            box-shadow: 0 0 8px #ff5a5a;
        }
        .btn-solid {
            background: linear-gradient(95deg, #ff2a2a, #ff5a3a);
            border: none;
            color: white;
            box-shadow: 0 0 10px #ff3a3a;
        }
        .btn-solid:hover {
            background: linear-gradient(95deg, #ff1a1a, #ff4a2a);
            box-shadow: 0 0 14px #ff4a4a;
            transform: scale(0.98);
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2.5rem;
            background: rgba(20, 5, 5, 0.7);
            border-radius: 40px;
            border: 1px solid #ff6a6a;
            color: #ffb3b3;
        }

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Szukaj produktów...">
            </div>
            <div class="categories-tabs" id="categoriesContainer"></div>
        </div>

      


        <!-- siatka produktów -->
        <div id="productsGrid" class="products-grid"></div>
        <footer>© 2026 Master Reps | Created by Rafx</footer>
    </div>

    <script src="products.js"></script>
    <script>
        // ---------- KATEGORIE ----------
        const categoriesDef = [
            { id: "all", plName: "Wszystkie", enName: "All" },
            { id: "buty", plName: "Buty", enName: "Shoes" },
            { id: "spodenki", plName: "Spodenki", enName: "Shorts" },
            { id: "spodnie", plName: "Spodnie", enName: "Pants" },
            { id: "koszulki", plName: "Koszulki", enName: "T-shirts" },
            { id: "bluzy", plName: "Bluzy", enName: "Hoodies" },
            { id: "kurtki", plName: "Kurtki", enName: "Jackets" },
            { id: "longsleeve", plName: "Longsleeve", enName: "Longsleeve" },
            { id: "elektronika", plName: "Elektronika", enName: "Electronics" },
            { id: "nakrycie glowy", plName: "Nakrycie głowy", enName: "Headwear" },
            { id: "torby i plecaki", plName: "Torby i plecaki", enName: "Bags & Backpacks" }
        ];

        const exchangeRates = { PLN: 0.56, USD: 0.14, CNY: 1  };

        let currentLang = "pl";
        let currentCurrency = "PLN";
        let activeCategoryId = "all";
        let searchQuery = "";

        // DOM elements
        const productsGrid = document.getElementById("productsGrid");
        const categoriesContainer = document.getElementById("categoriesContainer");
        const searchInput = document.getElementById("searchInput");
        const langSelect = document.getElementById("langSelect");
        const currencySelect = document.getElementById("currencySelect");
        const settingsIcon = document.getElementById("settingsIcon");
        const settingsDropdown = document.getElementById("settingsDropdown");

        // Toggle dropdown
        settingsIcon.addEventListener("click", (e) => {
            e.stopPropagation();
            settingsDropdown.classList.toggle("open");
        });
        document.addEventListener("click", (e) => {
            if (!settingsIcon.contains(e.target) && !settingsDropdown.contains(e.target)) {
                settingsDropdown.classList.remove("open");
            }
        });

        function formatPrice(priceCNY, currency) {
            let converted = priceCNY * exchangeRates[currency];
            if (currency === "PLN") return `${converted.toFixed(2)} zł`;
            if (currency === "USD") return `$${converted.toFixed(2)}`;
            return `¥${converted.toFixed(2)}`;
        }

        const translations = {
            pl: {
                searchPlaceholder: "Szukaj produktów...",
                viewDetails: "View Details",
                orderNow: "Order Now",
                noProducts: "Brak produktów spełniających kryteria.",
            },
            en: {
                searchPlaceholder: "Search products...",
                viewDetails: "View Details",
                orderNow: "Order Now",
                noProducts: "No products match your filters.",
            }
        };

        function updateUITexts() {
            const t = translations[currentLang];
            searchInput.placeholder = t.searchPlaceholder;
        }

        function renderCategories() {
            categoriesContainer.innerHTML = "";
            categoriesDef.forEach(cat => {
                const displayName = currentLang === "pl" ? cat.plName : cat.enName;
                const btn = document.createElement("button");
                btn.classList.add("cat-tab");
                if (activeCategoryId === cat.id) btn.classList.add("active");
                btn.innerText = displayName;
                btn.addEventListener("click", () => {
                    activeCategoryId = cat.id;
                    renderCategories();
                    renderProducts();
                });
                categoriesContainer.appendChild(btn);
            });
        }

        function getFilteredProducts() {
            let filtered = [...productsData];
            if (activeCategoryId !== "all") {
                filtered = filtered.filter(p => p.categoryId === activeCategoryId);
            }
            if (searchQuery.trim() !== "") {
                const q = searchQuery.trim().toLowerCase();
                filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
            }
            return filtered;
        }

        function showProductDetails(product) {
            const t = translations[currentLang];
            const priceMain = formatPrice(product.cnyPrice, currentCurrency);
            alert(`🔍 ${product.name}\n⭐ ${product.rating}/10\n💰 ${priceMain} (¥${product.cnyPrice.toFixed(2)} CNY)\n🏷️ ${product.tags.join(", ")}\n🔗 Link: ${product.link}`);
        }

        // Funkcja przekierowująca do linku produktu
        function orderProduct(product) {
            if (product.link) {
                window.open(product.link, "_blank");
            } else {
                alert("Link do produktu nie jest dostępny.");
            }
        }

        function renderProducts() {
            const filtered = getFilteredProducts();
            const t = translations[currentLang];
            if (filtered.length === 0) {
                productsGrid.innerHTML = `<div class="no-products"><i class="fas fa-box-open"></i> ${t.noProducts}</div>`;
                return;
            }
            productsGrid.innerHTML = filtered.map(prod => {
                const mainPrice = formatPrice(prod.cnyPrice, currentCurrency);
                const originalCNY = `¥${prod.cnyPrice.toFixed(2)} CNY`;
                const ratingVal = prod.rating;
                const fullStars = Math.floor(ratingVal / 2);
                const starDisplay = "★".repeat(fullStars) + "☆".repeat(5-fullStars);
                const imgUrl = prod.image || `https://picsum.photos/id/${(prod.id * 43) % 100}/300/200`;
                return `
                    <div class="product-card" data-id="${prod.id}">
                        <div class="card-img">
                            <img src="${imgUrl}" alt="${prod.name}" onerror="this.src='https://picsum.photos/300/200?grayscale'">
                        </div>
                        <div class="product-info">
                            <div class="product-title">${prod.name}</div>
                            <div class="price-block">
                                <span class="main-price">${mainPrice}</span>
                                <span class="cny-price">${originalCNY}</span>
                            </div>
                            <div class="tags-row">
                                ${prod.tags.map(tg => `<span class="tag">${tg}</span>`).join('')}
                            </div>
                            <div class="rating">
                                <i class="fas fa-star"></i> ${ratingVal}/10 &nbsp; <span style="color:#ffaa66">${starDisplay}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-outline view-detail" data-id="${prod.id}">${t.viewDetails}</button>
                                <button class="btn-solid order-now" data-id="${prod.id}">${t.orderNow}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.view-detail').forEach(btn => {
                const id = parseInt(btn.dataset.id);
                const product = productsData.find(p => p.id === id);
                if(product) btn.addEventListener('click', (e) => { e.stopPropagation(); showProductDetails(product); });
            });
            document.querySelectorAll('.order-now').forEach(btn => {
                const id = parseInt(btn.dataset.id);
                const product = productsData.find(p => p.id === id);
                if(product) btn.addEventListener('click', (e) => { e.stopPropagation(); orderProduct(product); });
            });
        }

        function refreshAll() {
            updateUITexts();
            renderCategories();
            renderProducts();
        }

        function bindEvents() {
            langSelect.addEventListener("change", (e) => {
                currentLang = e.target.value;
                refreshAll();
                settingsDropdown.classList.remove("open");
            });
            currencySelect.addEventListener("change", (e) => {
                currentCurrency = e.target.value;
                renderProducts();
                settingsDropdown.classList.remove("open");
            });
            searchInput.addEventListener("input", (e) => {
                searchQuery = e.target.value;
                renderProducts();
            });
        }

        function init() {
            bindEvents();
            activeCategoryId = "all";
            searchQuery = "";
            currentLang = "pl";
            currentCurrency = "PLN";
            langSelect.value = "pl";
            currencySelect.value = "PLN";
            refreshAll();
        }
        init();
    </script>
</body>
</html>
